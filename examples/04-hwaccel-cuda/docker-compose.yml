services:
  seanime:
    image: umagistr/seanime:latest-cuda
    container_name: seanime
    # Option 1: Using runtime (recommended)
    runtime: nvidia
    group_add:
      - video
    environment:
      - QBIT_WEBUI_PORT=8081
      - QBIT_USERNAME=admin
      - QBIT_PASSWORD=adminadmin
      - NVIDIA_VISIBLE_DEVICES=all # or '0' for first GPU
      - NVIDIA_DRIVER_CAPABILITIES=all
    ports:
      - "3211:43211"
      - "8081:8081" # qBittorrent WebUI
    volumes:
      - ./seanime-config:/home/seanime/.config/Seanime
      - ./anime:/anime
      - ./downloads:/downloads
    restart: unless-stopped
    
    # Option 2: Using deploy resources (alternative)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
